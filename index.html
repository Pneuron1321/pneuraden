<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PNEURADEN</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
/* ═══════════════════════════════════════════════════════════
   PNEURADEN — Design System v1.1
   Deep Bright Tech Cozyful
   ═══════════════════════════════════════════════════════════ */
:root {
  --bg:        #030508;
  --surface:   #0a0f1e;
  --surface2:  #0f1628;
  --surface3:  #151d35;
  --glass:     rgba(10,15,30,0.88);
  --border:    rgba(168,85,247,0.15);
  --border2:   rgba(168,85,247,0.32);
  --np:  #a855f7;
  --npi: #ec4899;
  --nc:  #22d3ee;
  --nm:  #34d399;
  --ns:  #38bdf8;
  --nl:  #818cf8;
  --ng:  #fbbf24;
  --vf:  #34d399;
  --pnd: #fbbf24;
  --ag:  #4ade80;
  --cl:  #475569;
  --dng: #f43f5e;
  --txt: #e2e8f0;
  --td:  rgba(226,232,240,0.55);
  --tm:  rgba(226,232,240,0.28);
  --r-s: 8px; --r-m: 16px; --r-l: 24px; --r-xl: 32px; --r-p: 9999px;
  --t-f: 0.15s ease;
  --t-m: 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg:        #eef2ff;
  --surface:   #ffffff;
  --surface2:  #f0f4ff;
  --surface3:  #e4ecff;
  --glass:     rgba(255,255,255,0.92);
  --border:    rgba(79,70,229,0.14);
  --border2:   rgba(79,70,229,0.28);
  --np: #7c3aed; --npi:#db2777; --nc:#0284c7;
  --nm:#059669; --ns:#0369a1; --nl:#4f46e5; --ng:#d97706;
  --vf:#059669; --pnd:#d97706; --ag:#16a34a; --cl:#64748b;
  --dng:#dc2626;
  --txt:#0f172a; --td:rgba(15,23,42,0.6); --tm:rgba(15,23,42,0.32);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:'Rajdhani',sans-serif;-webkit-font-smoothing:antialiased;
  overscroll-behavior:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

#app{width:100vw;height:100vh;height:100dvh;position:relative;overflow:hidden}

.vbg{position:fixed;inset:0;pointer-events:none;z-index:0}
[data-theme="dark"] .vbg{
  background:
    radial-gradient(ellipse 70% 50% at 15% 85%,rgba(168,85,247,0.07) 0%,transparent 70%),
    radial-gradient(ellipse 50% 35% at 85% 15%,rgba(34,211,238,0.05) 0%,transparent 70%),
    linear-gradient(rgba(168,85,247,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(168,85,247,0.04) 1px,transparent 1px);
  background-size:auto,auto,48px 48px,48px 48px}
[data-theme="light"] .vbg{
  background:
    radial-gradient(ellipse 70% 50% at 15% 85%,rgba(79,70,229,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 35% at 85% 15%,rgba(14,165,233,0.04) 0%,transparent 70%),
    linear-gradient(rgba(79,70,229,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(79,70,229,0.05) 1px,transparent 1px);
  background-size:auto,auto,48px 48px,48px 48px}

.view{position:absolute;inset:0;display:none;flex-direction:column}
.view.active{display:flex}

/* ── Island ── */
.island{
  background:var(--glass);border:1px solid var(--border2);
  border-radius:var(--r-l);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);padding:20px;position:relative;overflow:hidden}
[data-theme="dark"] .island{
  box-shadow:0 0 0 1px rgba(168,85,247,0.05),0 4px 24px rgba(0,0,0,0.45),
    0 0 60px rgba(168,85,247,0.04),inset 0 1px 0 rgba(255,255,255,0.04)}
[data-theme="light"] .island{
  box-shadow:0 0 0 1px rgba(79,70,229,0.05),0 4px 24px rgba(79,70,229,0.08),
    0 1px 3px rgba(0,0,0,0.06),inset 0 1px 0 rgba(255,255,255,0.8)}
.island::before{content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 50%,rgba(0,0,0,0.02) 100%);
  pointer-events:none}
.island-s{padding:12px 16px;border-radius:var(--r-m)}
.island-l{padding:28px;border-radius:var(--r-xl)}

/* ── Components ── */
.label{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--tm);font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 20px;border-radius:var(--r-s);border:1px solid var(--border2);
  background:var(--surface2);color:var(--txt);font-size:.8rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;transition:all var(--t-f);user-select:none}
.btn:hover{border-color:var(--np);box-shadow:0 0 12px rgba(168,85,247,0.22)}
.btn:active{transform:scale(0.97)}
.btn-p{background:var(--np);border-color:var(--np);color:#fff}
.btn-p:hover{background:var(--npi);border-color:var(--npi);box-shadow:0 0 20px rgba(236,72,153,0.4)}
.btn-g{background:transparent;border-color:transparent}
.btn-g:hover{background:var(--surface2);border-color:var(--border)}
.input{width:100%;padding:10px 14px;border-radius:var(--r-s);border:1px solid var(--border);
  background:var(--surface2);color:var(--txt);font-size:.9rem;outline:none;
  transition:border-color var(--t-f),box-shadow var(--t-f)}
.input:focus{border-color:var(--np);box-shadow:0 0 0 3px rgba(168,85,247,0.1)}
.input::placeholder{color:var(--tm)}
select.input{-webkit-appearance:none;cursor:pointer}
textarea.input{resize:vertical;min-height:72px;line-height:1.5}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:var(--r-p);font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.bv{background:rgba(52,211,153,.12);color:var(--vf);border:1px solid rgba(52,211,153,.25)}
.bp{background:rgba(251,191,36,.12);color:var(--pnd);border:1px solid rgba(251,191,36,.25)}
.ba{background:rgba(74,222,128,.12);color:var(--ag);border:1px solid rgba(74,222,128,.25)}
.pdot{width:6px;height:6px;border-radius:50%;background:currentColor;
  animation:pdotA 1.5s ease-in-out infinite}
@keyframes pdotA{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ── Pull-to-refresh ── */
#ptr{position:absolute;top:0;left:0;right:0;z-index:200;display:flex;
  align-items:center;justify-content:center;height:0;overflow:hidden;
  transition:height .2s ease}
#ptr.visible{height:64px}
.ptr-arc{width:36px;height:36px;border-radius:50%;
  border:2.5px solid transparent;
  border-top-color:var(--np);border-right-color:var(--nc);
  opacity:0;transition:opacity .15s,transform .15s}
#ptr.visible .ptr-arc{opacity:1}
#ptr.ready .ptr-arc{border-color:var(--nm);animation:ptrSpin .6s linear infinite}
@keyframes ptrSpin{to{transform:rotate(360deg)}}

/* ── Nav Bar ── */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;
  align-items:center;justify-content:space-around;
  padding:8px 16px max(16px,env(safe-area-inset-bottom));
  background:var(--glass);border-top:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 16px;border-radius:var(--r-m);cursor:pointer;
  transition:all var(--t-f);border:1px solid transparent;
  background:none;color:var(--tm);min-width:54px}
.ni.active{color:var(--np);border-color:var(--border);background:var(--surface2)}
.ni:hover:not(.active){color:var(--td)}
.ni-icon{font-size:1.2rem;line-height:1}
.ni-lbl{font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;font-weight:700}

/* ── Top Bar ── */
.topbar{position:relative;z-index:10;display:flex;align-items:center;
  justify-content:space-between;padding:16px 20px 12px;
  padding-top:max(16px,env(safe-area-inset-top))}
.logo{font-family:'Orbitron',monospace;font-size:1rem;font-weight:900;
  letter-spacing:.2em;background:linear-gradient(135deg,var(--np),var(--npi));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.theme-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;
  font-size:1rem;transition:all var(--t-f)}
.theme-btn:hover{border-color:var(--np);box-shadow:0 0 12px rgba(168,85,247,0.3)}

/* ── HOME / RADAR ── */
#vh{align-items:center;justify-content:space-between}
.home-main{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;position:relative;z-index:5;gap:20px;padding:0 20px}
.radar-wrap{position:relative;width:280px;height:280px;cursor:pointer;
  user-select:none;-webkit-user-select:none}
.radar-wrap:hover #radar{filter:brightness(1.15) drop-shadow(0 0 22px rgba(0,200,80,.55))}
#radar-minimap{position:absolute;top:0;left:0;width:280px;height:280px;
  border-radius:50%;overflow:hidden;z-index:0}
#radar{position:absolute;top:0;left:0;width:280px;height:280px;border-radius:50%;
  display:block;z-index:1;pointer-events:none;
  transition:filter var(--t-f);
  filter:drop-shadow(0 0 14px rgba(0,180,70,.35))}
.radar-hint{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);
  font-size:.58rem;letter-spacing:.25em;color:var(--tm);text-transform:uppercase;
  white-space:nowrap;animation:hintA 2.5s ease-in-out infinite}
@keyframes hintA{0%,100%{opacity:.3}50%{opacity:.9}}
.zpills{display:flex;gap:6px;margin-top:8px}
.zpill{width:7px;height:7px;border-radius:50%;border:1px solid var(--border2);
  background:transparent;cursor:pointer;transition:all var(--t-f)}
.zpill.active{background:var(--nm);border-color:var(--nm);box-shadow:0 0 6px rgba(52,211,153,.6)}
.home-title{font-family:'Orbitron',monospace;font-size:clamp(1.3rem,5vw,1.9rem);
  font-weight:900;letter-spacing:.2em;text-align:center}
[data-theme="dark"] .home-title{
  background:linear-gradient(135deg,#a855f7,#ec4899,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
[data-theme="light"] .home-title{color:var(--nl)}
.home-coords{font-family:'Orbitron',monospace;font-size:.58rem;letter-spacing:.12em;
  color:var(--tm);text-align:center;margin-top:4px}
.stats{display:flex;gap:10px;width:100%;max-width:340px}
.stat{flex:1;padding:10px 12px;border-radius:var(--r-m);background:var(--surface);
  border:1px solid var(--border);text-align:center}
.stat-n{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;color:var(--nc)}
.stat-l{font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--tm);margin-top:2px}

/* ── MAP ── */
#vm{background:#0a0a10;overflow:hidden}
#map-container{
  position:absolute;
  /* Must cover screen diagonal at any angle. Proof: diagonal=√(vw²+vh²) ≤ √2·vmax
     So 142vmax×142vmax guaranteed to cover any screen shape at any rotation */
  width:142vmax;height:142vmax;
  top:50%;left:50%;
  margin-top:-71vmax;margin-left:-71vmax;
  z-index:1;
  transform-origin:center center}
.map-top{position:absolute;top:0;left:0;right:0;z-index:500;display:flex;
  align-items:center;padding:12px 16px;gap:10px;
  padding-top:max(12px,env(safe-area-inset-top));
  background:linear-gradient(to bottom,rgba(3,5,8,.95) 0%,transparent 100%)}
.map-back{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);
  background:var(--glass);backdrop-filter:blur(10px);display:flex;
  align-items:center;justify-content:center;color:var(--txt);font-size:.9rem;
  flex-shrink:0;transition:all var(--t-f)}
.map-back:hover{border-color:var(--np)}
.map-search{flex:1;height:36px;border-radius:var(--r-p);border:1px solid var(--border);
  background:var(--glass);backdrop-filter:blur(10px);padding:0 14px;
  color:var(--txt);font-size:.85rem;outline:none}
.map-layers{position:absolute;top:70px;right:12px;z-index:500;display:flex;flex-direction:column;gap:6px}
.lbtn{width:36px;height:36px;border-radius:var(--r-s);border:1px solid var(--border2);
  background:var(--glass);backdrop-filter:blur(10px);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:.85rem;transition:all var(--t-f);
  color:var(--td)}
.lbtn.active{border-color:var(--nm);color:var(--nm)}
.lbtn:hover:not(.active){color:var(--txt)}
.map-locate{position:absolute;bottom:80px;left:12px;z-index:500;width:40px;height:40px;
  border-radius:50%;border:1px solid var(--border2);background:var(--glass);
  backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;color:var(--nc);transition:all var(--t-f)}
.map-locate:hover{border-color:var(--nc);box-shadow:0 0 12px rgba(34,211,238,.3)}
.map-addbtn{position:absolute;bottom:80px;left:62px;z-index:500;height:40px;
  padding:0 16px;border-radius:var(--r-p);border:1px solid var(--np);
  background:var(--glass);backdrop-filter:blur(10px);display:flex;align-items:center;
  gap:6px;cursor:pointer;font-size:.72rem;font-weight:700;letter-spacing:.1em;
  color:var(--np);text-transform:uppercase;transition:all var(--t-f)}
.map-addbtn:hover{background:rgba(168,85,247,.15);box-shadow:0 0 16px rgba(168,85,247,.3)}
.map-legend{position:absolute;bottom:80px;right:0;z-index:500;width:190px;
  transform:translateX(100%);transition:transform var(--t-m)}
.map-legend.open{transform:translateX(0)}
.leg-tog{position:absolute;left:-38px;top:0;width:38px;height:38px;
  border-radius:var(--r-s) 0 0 var(--r-s);background:var(--glass);
  backdrop-filter:blur(10px);border:1px solid var(--border2);border-right:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:.8rem;color:var(--td)}
.leg-body{background:var(--glass);backdrop-filter:blur(20px);
  border:1px solid var(--border2);border-radius:var(--r-m) 0 0 var(--r-m);padding:14px}
.leg-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.7rem;color:var(--td)}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Leaflet */
.leaflet-container{font-family:'Rajdhani',sans-serif;background:#0a0a14}
/* Dark theme: high brightness lifts dark tiles; low contrast avoids clipping */
[data-theme="dark"] #radar-minimap .leaflet-tile-pane{filter:brightness(4.5) contrast(1.15)}
[data-theme="dark"] #map-container  .leaflet-tile-pane{filter:brightness(3.8) contrast(1.1)}
/* Light theme: boost contrast and saturation for clarity */
[data-theme="light"] #radar-minimap .leaflet-tile-pane{filter:contrast(1.5) saturate(1.4)}
[data-theme="light"] #map-container  .leaflet-tile-pane{filter:contrast(1.35) saturate(1.3)}
.leaflet-popup-content-wrapper{background:transparent;border:none;box-shadow:none;padding:0}
.leaflet-popup-content{margin:0}
.leaflet-popup-tip{display:none}
/* Club popup */
.club-pop{width:280px;background:var(--glass);border:1px solid var(--border2);
  border-radius:var(--r-l);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 0 1px rgba(168,85,247,.1)}
.club-hd{padding:16px 18px;background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(236,72,153,.1));
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.club-logo{width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,rgba(168,85,247,.2),rgba(236,72,153,.15));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  border:1px solid rgba(168,85,247,.4)}
.club-nm{font-family:'Orbitron',monospace;font-size:.72rem;font-weight:700;letter-spacing:.08em}
.club-sub{font-size:.62rem;color:var(--tm);margin-top:2px}
.club-bd{padding:14px 18px}
.srow{display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--border);font-size:.75rem}
.srow:last-child{border-bottom:none}
.sday{color:var(--td);letter-spacing:.04em}
.stime{color:var(--txt);font-weight:700;font-family:'Orbitron',monospace;font-size:.62rem}
/* Event popup */
.ev-pop{width:250px;background:var(--glass);border:1px solid var(--border2);
  border-radius:var(--r-l);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.ev-pop-t{font-family:'Orbitron',monospace;font-size:.72rem;font-weight:700;
  letter-spacing:.06em;margin-bottom:8px}
.ev-pop-m{font-size:.7rem;color:var(--td);line-height:1.55}
/* User popup */
.user-pop{width:220px;background:var(--glass);border:1px solid var(--border2);
  border-radius:var(--r-l);backdrop-filter:blur(24px);
  padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.4)}

/* ── EVENTS ── */
#ve{overflow:hidden}
.ev-scroll{flex:1;overflow-y:auto;padding:0 16px 80px;display:flex;flex-direction:column;gap:8px}
.ev-scroll::-webkit-scrollbar{width:3px}
.ev-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sec-lbl{display:flex;align-items:center;gap:10px;padding:8px 0 4px}
.sec-lbl-t{font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;
  color:var(--tm);font-weight:700;white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}
.ev-card{padding:14px 16px;border-radius:var(--r-m);background:var(--surface);
  border:1px solid var(--border);transition:all var(--t-f);cursor:pointer}
.ev-card:hover{border-color:var(--border2);transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,.2)}
.ev-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.ev-card-t{font-weight:700;font-size:.88rem;flex:1;margin-right:8px}
.ev-card-m{display:flex;flex-direction:column;gap:3px;font-size:.68rem;color:var(--td)}
.ev-card-d{font-size:.76rem;color:var(--td);line-height:1.5;margin-top:5px}

/* ── ADD EVENT SHEET ── */
.sheet{position:fixed;inset:0;z-index:1000;display:none;align-items:flex-end}
.sheet.open{display:flex}
.sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.sheet-box{position:relative;z-index:1;width:100%;background:var(--surface);
  border-radius:var(--r-xl) var(--r-xl) 0 0;border:1px solid var(--border2);border-bottom:none;
  padding:20px 20px max(24px,env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto;
  animation:sheetUp var(--t-m) forwards}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--border2);
  margin:0 auto 20px}
.fg{margin-bottom:14px}
.flbl{display:block;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--tm);margin-bottom:6px;font-weight:700}

/* ── PROFILE ── */
#vp{overflow:hidden}
.prof-scroll{flex:1;overflow-y:auto;padding:0 16px 80px;display:flex;flex-direction:column;gap:14px}
.prof-scroll::-webkit-scrollbar{width:3px}
.prof-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.avatar{width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--np),var(--npi));
  display:flex;align-items:center;justify-content:center;font-size:2rem;
  margin:0 auto;box-shadow:0 0 24px rgba(168,85,247,.4)}
.auth-form{display:flex;flex-direction:column;gap:12px}
/* Color swatches */
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;padding:6px 0}
.cswatch{width:30px;height:30px;border-radius:50%;cursor:pointer;
  transition:all .15s;border:2px solid transparent}
.cswatch.selected{transform:scale(1.25);border-color:white}

/* ── ADMIN ── */
#vad{overflow:hidden}
.adm-scroll{flex:1;overflow-y:auto;padding:0 16px 80px;display:flex;flex-direction:column;gap:10px}
.adm-scroll::-webkit-scrollbar{width:3px}
.adm-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.qcard{padding:14px 16px;border-radius:var(--r-m);background:var(--surface);
  border:1px solid rgba(251,191,36,.4);display:flex;flex-direction:column;gap:8px}
.adm-acts{display:flex;gap:8px}
.btn-ok{flex:1;background:rgba(52,211,153,.1);border-color:var(--vf);color:var(--vf);font-size:.7rem}
.btn-ok:hover{background:rgba(52,211,153,.2);box-shadow:0 0 10px rgba(52,211,153,.3)}
.btn-no{flex:1;background:rgba(244,63,94,.1);border-color:var(--dng);color:var(--dng);font-size:.7rem}
.btn-no:hover{background:rgba(244,63,94,.2);box-shadow:0 0 10px rgba(244,63,94,.3)}
.status-tog{display:flex;gap:10px;align-items:center;padding:14px 16px;
  border-radius:var(--r-m);background:var(--surface);border:1px solid var(--border)}
.tog{position:relative;width:48px;height:26px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;border-radius:13px;background:var(--surface3);
  border:1px solid var(--border);cursor:pointer;transition:all var(--t-f)}
.tog-sl::before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;
  background:var(--tm);top:3px;left:3px;transition:all var(--t-f)}
input:checked+.tog-sl{background:rgba(74,222,128,.2);border-color:var(--ag)}
input:checked+.tog-sl::before{background:var(--ag);transform:translateX(22px);
  box-shadow:0 0 8px rgba(74,222,128,.5)}

/* ── TOAST ── */
#toasts{position:fixed;top:20px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{padding:10px 20px;border-radius:var(--r-p);background:var(--surface2);
  border:1px solid var(--border2);font-size:.78rem;letter-spacing:.05em;
  color:var(--txt);backdrop-filter:blur(10px);
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  animation:tin .3s ease,tout .3s ease 2.7s forwards}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{from{opacity:1}to{opacity:0}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div id="app">
<div class="vbg"></div>

<!-- ═══ HOME ═══ -->
<div id="vh" class="view active">
  <div id="ptr"><div class="ptr-arc"></div></div>
  <div class="topbar">
    <span class="logo">PNEURADEN</span>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="uid" style="font-size:.6rem;letter-spacing:.15em;color:var(--tm);text-transform:uppercase"></span>
      <button class="theme-btn" onclick="toggleTheme()">🌓</button>

  </div>
  <div class="home-main">
    <div class="radar-wrap" id="rwrap" onclick="goMap()">

    </div>
  </div>
</div>

<!-- ═══ MAP ═══ -->
<div id="vm" class="view">
  <div class="map-top">
    <button class="map-back" onclick="go('home')">←</button>
    <input class="map-search" placeholder="Поиск..." type="text">
    <button class="theme-btn" onclick="toggleTheme()" style="flex-shrink:0">🌓</button>
  </div>
  <div id="map-container"></div>
  <div class="map-layers">
    <div class="lbtn active" id="lv" onclick="toggleL('v')" title="Верифицированные">🟢</div>
    <div class="lbtn active" id="lp" onclick="toggleL('p')" title="На проверке">🟡</div>
    <div class="lbtn active" id="lc" onclick="toggleL('c')" title="Клуб">⭕</div>
  </div>
  <div class="map-legend" id="mleg">
    <div class="leg-tog" onclick="document.getElementById('mleg').classList.toggle('open')">☰</div>
    <div class="leg-body">
      <div class="label" style="margin-bottom:10px">Легенда</div>
      <div class="leg-item"><div class="ldot" style="background:#4ade80;box-shadow:0 0 6px #4ade80"></div>Верифицировано</div>
      <div class="leg-item"><div class="ldot" style="background:#fbbf24;box-shadow:0 0 6px #fbbf24"></div>На проверке</div>
      <div class="leg-item"><div class="ldot" style="background:#a855f7;box-shadow:0 0 6px #a855f7"></div>Борцовский клуб</div>
      <div class="leg-item"><div class="ldot" style="background:#ef4444;box-shadow:0 0 6px #ef4444;animation:pdotA 1.5s ease-in-out infinite"></div>Пользователи</div>
    </div>
  </div>
  <button class="map-locate" onclick="locate()" title="Моя позиция">📍</button>
  <button class="map-locate" onclick="refreshGeo()" title="Обновить геолокацию" style="bottom:134px;width:48px;height:48px;left:10px;font-size:1.4rem;color:var(--np)">↻</button>
  <button class="map-locate" onclick="if(window._map&&window._um)window._map.setView(window._um.getLatLng(),ZOOM_MAP[1]);else if(window._map)window._map.setZoom(ZOOM_MAP[1])" title="Моя позиция · зум как на радаре" style="bottom:194px;width:48px;height:48px;left:10px;padding:0;border-color:rgba(52,211,153,.45);color:var(--nm)">
    <svg viewBox="0 0 40 40" width="26" height="26">
      <!-- magnifying glass -->
      <circle cx="17" cy="17" r="10" stroke="rgba(52,211,153,.85)" stroke-width="2.2" fill="none"/>
      <line x1="24.5" y1="24.5" x2="34" y2="34" stroke="rgba(52,211,153,.85)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- location pin inside -->
      <circle cx="17" cy="15.5" r="3" stroke="rgba(52,211,153,1)" stroke-width="1.8" fill="none"/>
      <line x1="17" y1="18.5" x2="17" y2="23" stroke="rgba(52,211,153,1)" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="map-locate" onclick="go('home')" title="Радар" style="bottom:254px;width:48px;height:48px;left:10px;padding:0;border-color:rgba(0,200,75,.4);background:rgba(4,7,16,.85)">
    <svg viewBox="0 0 40 40" width="32" height="32">
      <circle cx="20" cy="20" r="17" stroke="rgba(0,255,80,.65)" stroke-width="1.2" fill="none"/>
      <circle cx="20" cy="20" r="11" stroke="rgba(0,255,80,.4)" stroke-width="1" fill="none"/>
      <circle cx="20" cy="20" r="5.5" stroke="rgba(0,255,80,.25)" stroke-width="1" fill="none"/>
      <line x1="20" y1="3" x2="20" y2="37" stroke="rgba(0,255,80,.18)" stroke-width="1"/>
      <line x1="3" y1="20" x2="37" y2="20" stroke="rgba(0,255,80,.18)" stroke-width="1"/>
      <text x="20" y="9.5" text-anchor="middle" font-size="5.5" fill="rgba(255,55,55,.95)" font-family="Orbitron,monospace" font-weight="900">N</text>
      <circle cx="20" cy="20" r="2.5" fill="#fff" opacity=".9"/>
    </svg>
  </button>
  <button class="map-addbtn" onclick="openSheet()">+ добавить ивент</button>
</div>

<!-- ═══ EVENTS ═══ -->
<div id="ve" class="view">
  <div class="topbar">
    <span class="logo" style="font-size:.85rem">ИВЕНТЫ</span>
    <button class="btn btn-p" style="font-size:.65rem;padding:6px 14px" onclick="openSheet()">+ Добавить</button>

</div>

<div id="vp" class="view">

</div>

<!-- NAV -->

<!-- ADD EVENT SHEET -->
<div class="sheet" id="sheet">
  <div class="sheet-bg" onclick="closeSheet()"></div>
  <div class="sheet-box">
    <div class="sheet-handle"></div>
    <div style="font-family:'Orbitron',monospace;font-size:.78rem;letter-spacing:.15em;margin-bottom:16px">НОВЫЙ ИВЕНТ</div>
    <div class="fg"><label class="flbl">Название *</label>
      <input class="input" id="et" placeholder="Название ивента" type="text"></div>
    <div class="fg"><label class="flbl">Тип</label>
      <select class="input" id="ety">
        <option value="training">🥋 Тренировка</option>
        <option value="concert">🎸 Концерт</option>
        <option value="market">🛒 Маркет</option>

        <option value="sport">⚽ Спорт</option>
        <option value="other">⭐ Другое</option>
      </select></div>
    <div class="fg"><label class="flbl">Дата и время</label>
      <input class="input" id="ed" type="datetime-local"></div>
    <div class="fg"><label class="flbl">Место (адрес)</label>
      <input class="input" id="eloc" placeholder="Адрес или описание места" type="text"></div>
    <div class="fg"><label class="flbl">Описание</label>
      <textarea class="input" id="edesc" placeholder="Описание ивента..."></textarea></div>
    <div class="fg"><label class="flbl">Сообщение администратору</label>
      <textarea class="input" id="emsg" placeholder="Дополнительная информация..." style="min-height:58px"></textarea></div>
    <button class="btn btn-p" style="width:100%" onclick="submitEv()">Отправить на верификацию</button>
  </div>
</div>

<div id="toasts"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   PNEURADEN v1.1 — Core
   ═══════════════════════════════════════════════════════════ */

// One-time migration: clear fake default events from v1.0
if(!localStorage.getItem('pnd-v2')){
  localStorage.removeItem('pnd-ev');
  localStorage.setItem('pnd-v2','1');
}

/* ── Constants ─────────────────────────────────────────── */
const _sc = JSON.parse(localStorage.getItem('pnd-club')||'null');
const CLUB = {
  get lat(){ return JSON.parse(localStorage.getItem('pnd-club')||'null')?.lat ?? 45.0811; },
  get lng(){ return JSON.parse(localStorage.getItem('pnd-club')||'null')?.lng ?? 13.6387; },
  name:'HK Rovinj Rovigno', sub:'Борцовский клуб · Ровинь',
  schedule:[
    {d:'Пн',t:'18:30 — 20:30'},{d:'Ср',t:'18:30 — 20:30'},
    {d:'Пт',t:'18:30 — 20:30'},{d:'Сб',t:'10:00 — 12:00'}
  ],
  contact:'+385 91 xxx xxxx'
};

const EV_ICONS = {training:'🥋',concert:'🎸',market:'🛒',meetup:'🤝',sport:'⚽',other:'⭐'};

const USER_COLORS = [
  {id:'cyan',   o:'#22d3ee', i:'#0891b2'},
  {id:'mint',   o:'#34d399', i:'#059669'},
  {id:'sky',    o:'#38bdf8', i:'#0369a1'},
  {id:'amber',  o:'#fbbf24', i:'#b45309'},
  {id:'rose',   o:'#fb7185', i:'#e11d48'},
  {id:'violet', o:'#818cf8', i:'#4338ca'},
  {id:'orange', o:'#fb923c', i:'#c2410c'},
  {id:'lime',   o:'#a3e635', i:'#4d7c0f'},
];

function defaultEvents(){ return []; }

const S = {
  view:'home',
  theme: localStorage.getItem('pnd-t')||'dark',
  clubActive: JSON.parse(localStorage.getItem('pnd-ca')?? 'true'),
  user: JSON.parse(localStorage.getItem('pnd-u')||'null'),
  events: JSON.parse(localStorage.getItem('pnd-ev')||'null') || defaultEvents(),
  mapInit:false,
  radarZoom:1,
  compassAngle:0
};

document.documentElement.setAttribute('data-theme',S.theme);

/* ── SVG Generators ─────────────────────────────────────── */
function clubSVG(color, size=32){
  // Wrestling mat — top-down view with passive zone and competition halves
  return `<svg width="${size}" height="${size}" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="24" cy="24" r="22" fill="#12082a" stroke="${color}" stroke-width="2.5"/>
    <circle cx="24" cy="24" r="14.5" fill="none" stroke="#c8922a" stroke-width="2" opacity="0.9"/>
    <path d="M 9.5 24 A 14.5 14.5 0 0 1 38.5 24 Z" fill="#2563eb" opacity="0.55"/>
    <path d="M 9.5 24 A 14.5 14.5 0 0 0 38.5 24 Z" fill="#dc2626" opacity="0.55"/>
    <circle cx="24" cy="24" r="4.5" fill="${color}" opacity="0.95"/>
    <circle cx="24" cy="24" r="4.5" stroke="rgba(255,255,255,0.6)" stroke-width="1" fill="none"/>
    <line x1="9.5" y1="24" x2="38.5" y2="24" stroke="${color}" stroke-width="1" opacity="0.4"/>
  </svg>`;
}

function compassSVG(outer, inner, size=40, isAdmin=false){
  // Compass with north arrow always pointing up
  const gold = '#fbbf24';
  const ro = isAdmin ? gold : outer;
  const ri = isAdmin ? '#ef4444' : inner;
  return `<svg width="${size}" height="${size}" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="24" cy="24" r="22" fill="${ro}18" stroke="${ro}" stroke-width="2.5"/>
    <circle cx="24" cy="24" r="14" fill="#080c1a" stroke="${ro}60" stroke-width="1"/>
    <polygon points="24,11 20.5,24 24,21 27.5,24" fill="#ef4444"/>
    <polygon points="24,37 20.5,24 24,27 27.5,24" fill="${ri}"/>
    <circle cx="24" cy="24" r="2.8" fill="white" opacity="0.9"/>
    <text x="24" y="9" text-anchor="middle" fill="#ef4444" font-size="5.5" font-weight="900" font-family="Orbitron,monospace">N</text>
  </svg>`;
}

function guestBlipSVG(size=24){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="10" fill="#ef444430" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="4" fill="#ef4444" opacity="0.8"/>
  </svg>`;
}

/* ── User color helpers ─────────────────────────────────── */
function getUserColorObj(){
  if(!S.user) return {o:'#ef4444',i:'#b91c1c'};
  if(S.user.role==='admin') return {o:'#fbbf24',i:'#ef4444'};
  const cid = S.user.colorId || 'cyan';
  return USER_COLORS.find(c=>c.id===cid) || USER_COLORS[0];
}

function saveUserLocation(lat,lng){
  if(!S.user || S.user.role==='admin') return;
  const users = JSON.parse(localStorage.getItem('pnd-users')||'{}');
  if(users[S.user.email]){
    users[S.user.email].lat = lat;
    users[S.user.email].lng = lng;
    users[S.user.email].lastSeen = Date.now();
    users[S.user.email].statusMsg = S.user.statusMsg || '';
    users[S.user.email].colorId = S.user.colorId || 'cyan';
    localStorage.setItem('pnd-users',JSON.stringify(users));
  }
}

/* ── Navigation ─────────────────────────────────────────── */
function go(v){
  if(v===S.view && v!=='map') return;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  const ids={home:'vh',map:'vm',events:'ve',profile:'vp',admin:'vad'};
  const el=document.getElementById(ids[v]);
  if(el) el.classList.add('active');
  const ni=document.querySelector(`.ni[data-v="${v}"]`);
  if(ni) ni.classList.add('active');
  S.view=v;
  const nav=document.getElementById('nav');
  if(v==='map'){nav.style.display='none';initMap();}
  else nav.style.display='flex';
  if(v==='events') renderEvents();
  if(v==='profile') renderProfile();
  if(v==='admin') renderAdmin();
}
function goMap(){go('map');}

/* ── Theme ──────────────────────────────────────────────── */
function toggleTheme(){
  S.theme=S.theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',S.theme);
  localStorage.setItem('pnd-t',S.theme);
  const tileUrl=S.theme==='dark'
    ?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    :'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  if(S.mapInit && window._ml) window._ml.setUrl(tileUrl);
  if(window._minimapTL) window._minimapTL.setUrl(tileUrl);
}

/* ── Helpers ────────────────────────────────────────────── */
function toast(msg){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  c.appendChild(t);setTimeout(()=>t.remove(),3100);
}
function saveEv(){
  localStorage.setItem('pnd-ev',JSON.stringify(S.events));
  document.getElementById('sv').textContent=S.events.filter(e=>e.verified).length;
  document.getElementById('sp').textContent=S.events.filter(e=>!e.verified).length;
}
function fmtDate(d){
  if(!d)return'—';
  return new Date(d).toLocaleString('ru-RU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}
function clubStatusUI(){
  const dot=document.getElementById('cs-dot'),lbl=document.getElementById('cs-lbl');
  if(S.clubActive){dot.style.color='var(--ag)';lbl.textContent='Тренировка';}
  else{dot.style.color='var(--cl)';lbl.textContent='Закрыто';}
}
function updateUID(){
  const el=document.getElementById('uid');
  if(el) el.textContent=S.user?(S.user.role==='admin'?'⚡ admin':S.user.email.split('@')[0]):'';
}

/* ── Zoom pills ─────────────────────────────────────────── */
function setZoom(i,e){
  e.stopPropagation();
  S.radarZoom=i;
  document.querySelectorAll('.zpill').forEach((p,pi)=>p.classList.toggle('active',pi===i));
}

/* ── Events render ──────────────────────────────────────── */
function renderEvents(){
  const c=document.getElementById('evlist');if(!c)return;
  const vf=S.events.filter(e=>e.verified),pd=S.events.filter(e=>!e.verified);
  let h=`<div class="sec-lbl"><span class="sec-lbl-t">Верифицированные</span><div class="sec-line"></div></div>`;
  if(!vf.length) h+=`<div style="font-size:.75rem;color:var(--tm);padding:12px 0;text-align:center">Нет верифицированных ивентов</div>`;
  vf.forEach(e=>h+=evCard(e));
  h+=`<div class="sec-lbl" style="margin-top:8px"><span class="sec-lbl-t">На проверке</span><div class="sec-line"></div></div>`;
  if(!pd.length) h+=`<div style="font-size:.75rem;color:var(--tm);padding:12px 0;text-align:center">Нет ивентов на проверке</div>`;
  pd.forEach(e=>h+=evCard(e));
  c.innerHTML=h;
}
function evCard(ev){
  const ic=EV_ICONS[ev.type]||'📍';
  return`<div class="ev-card" onclick="jumpToEv('${ev.id}')">
    <div class="ev-card-top">
      <div class="ev-card-t">${ic} ${ev.title}</div>
      <span class="badge ${ev.verified?'bv':'bp'}">${ev.verified?'✓':'⏳'} ${ev.verified?'Верифицировано':'Ожидание'}</span>
    </div>
    <div class="ev-card-m"><span>📅 ${fmtDate(ev.date)}</span><span>👤 ${ev.addedBy}</span>${ev.loc?`<span>📍 ${ev.loc}</span>`:''}</div>
    ${ev.desc?`<div class="ev-card-d">${ev.desc}</div>`:''}
  </div>`;
}
function jumpToEv(id){
  const ev=S.events.find(e=>e.id===id);if(!ev)return;
  go('map');
  setTimeout(()=>{if(window._map)window._map.setView([ev.lat,ev.lng],16);},600);
}

/* ── Add Event ──────────────────────────────────────────── */
function openSheet(){
  if(!S.user){toast('Войдите чтобы добавить ивент');go('profile');return;}
  const now=new Date();now.setHours(now.getHours()+1,0,0,0);

function initMap(){
  if(S.mapInit)return;S.mapInit=true;
  // Start with neutral view; pans to user on first GPS fix
  const map=L.map('map-container',{center:[45.0811,13.6387],zoom:4,
    zoomControl:false,attributionControl:false});
  window._map=map;
  const turl=S.theme==='dark'
    ?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    :'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  window._ml=L.tileLayer(turl,{maxZoom:19,subdomains:'abcd'}).addTo(map);
  // invalidateSize so Leaflet loads tiles for the oversized (141.5%) container
  setTimeout(()=>map.invalidateSize(),200);
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.control.attribution({position:'bottomleft',prefix:false})
    .addAttribution('© CartoDB · © OSM').addTo(map);
  addEvMarkers(map);
  if(navigator.geolocation){
    // watchPosition + enableHighAccuracy = continuous GPS-grade updates
    let firstFix=true;
    if(window._geoWatch!=null) navigator.geolocation.clearWatch(window._geoWatch);
    window._geoWatch=navigator.geolocation.watchPosition(
      p=>{
        const lat=p.coords.latitude,lng=p.coords.longitude;
        addUserMarker(map,lat,lng);
        if(firstFix){
          firstFix=false;
          map.setView([lat,lng],16); // centre on user, zoom in
        }
      },
      e=>{
        // Fall back to rough position on error
        if(e.code===e.PERMISSION_DENIED) toast('Разрешите геолокацию для точного отображения');
      },
      {enableHighAccuracy:true, timeout:15000, maximumAge:0}
    );
  }

  // Map rotation via deviceorientation
  if('DeviceOrientationEvent' in window){
    const onOrient = e=>{
      // webkitCompassHeading (iOS) = 0..360 CW from North — reliable
      // e.alpha (Android) = device rotation CCW; convert to CW heading
      const head = e.webkitCompassHeading != null
        ? e.webkitCompassHeading
        : (e.alpha != null ? (360 - e.alpha) % 360 : null);
      if(head == null) return;
      const container=document.getElementById('map-container');
      if(container) container.style.transform=`rotate(${-head}deg)`;
      // Counter-rotate compass markers so they always point true north
      document.querySelectorAll('.cmarker-inner').forEach(el=>{
        el.style.transform=`rotate(${head}deg)`;
      });
    };
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      DeviceOrientationEvent.requestPermission().then(r=>{
        if(r==='granted') window.addEventListener('deviceorientation',onOrient);
      }).catch(()=>{});
    } else {
      window.addEventListener('deviceorientation',onOrient);
    }
  }
}

  return L.divIcon({className:'',iconSize:[size,size],iconAnchor:[size/2,size/2],

  if(aMode==='login'){
    if(email==='admin@pneuraden.com'&&pw==='admin123'){
      S.user={email,role:'admin'};

      S.user={email,role:'user',name:users[email].name,colorId:users[email].colorId||'cyan',statusMsg:users[email].statusMsg||''};

  <div class="sec-lbl"><span class="sec-lbl-t">Очередь верификации (${pd.length})</span><div class="sec-line"></div></div>`;
  if(!pd.length){
    h+=`<div class="island island-s" style="text-align:center">
      <div style="font-size:1.5rem">✓</div>
      <div style="font-size:.75rem;color:var(--tm);margin-top:4px">Очередь пуста</div>
    </div>`;
  } else {
    pd.forEach(ev=>{
      h+=`<div class="qcard">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="font-weight:700;font-size:.88rem">${EV_ICONS[ev.type]||'📍'} ${ev.title}</div>
          <span class="badge bp">⏳</span>
        </div>
        <div style="font-size:.7rem;color:var(--td)">📅 ${fmtDate(ev.date)} · 👤 ${ev.addedBy}${ev.loc?` · 📍 ${ev.loc}`:''}</div>
        ${ev.desc?`<div style="font-size:.74rem;color:var(--td)">${ev.desc}</div>`:''}
        ${ev.msg?`<div style="font-size:.7rem;padding:8px;border-radius:8px;background:var(--surface2);color:var(--td)">"${ev.msg}"</div>`:''}
        <div class="adm-acts">
          <button class="btn btn-ok" onclick="verEv('${ev.id}')">✓ Верифицировать</button>
          <button class="btn btn-no" onclick="delEv('${ev.id}')">✕ Отклонить</button>
        </div>
      </div>`;
    });
  }
  h+=`<div class="sec-lbl" style="margin-top:8px"><span class="sec-lbl-t">Верифицировано (${vf.length})</span><div class="sec-line"></div></div>`;
  vf.forEach(ev=>{
    h+=`<div class="ev-card" style="border-color:rgba(52,211,153,.2)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:.85rem;font-weight:700">${EV_ICONS[ev.type]||'📍'} ${ev.title}</div>
        <button class="btn" style="font-size:.6rem;padding:4px 8px;color:var(--dng);border-color:rgba(244,63,94,.3)" onclick="delEv('${ev.id}')">✕</button>
      </div>
    </div>`;
  });
  c.innerHTML=h;
}

function setClub(v){
  S.clubActive=v;localStorage.setItem('pnd-ca',JSON.stringify(v));
  clubStatusUI();renderAdmin();toast(v?'🟢 Тренировка началась!':'⚫ Клуб закрыт');
  if(S.mapInit){S.mapInit=false;document.getElementById('map-container').innerHTML='';
    window._map=null;_minimap=null;}
}

function saveClubLoc(){
  const lat=parseFloat(document.getElementById('clat')?.value);
  const lng=parseFloat(document.getElementById('clng')?.value);
  if(isNaN(lat)||isNaN(lng)||lat<-90||lat>90||lng<-180||lng>180){
    toast('Некорректные координаты');return;
  }
  localStorage.setItem('pnd-club',JSON.stringify({lat,lng}));
  if(S.mapInit){S.mapInit=false;document.getElementById('map-container').innerHTML='';
    window._map=null;_minimap=null;}
  renderAdmin();
  toast(`Локация клуба сохранена ✓ ${lat.toFixed(5)}°N`);
}

function setClubLocGeo(){
  if(!navigator.geolocation){toast('Геолокация недоступна');return;}
  navigator.geolocation.getCurrentPosition(p=>{
    const lat=p.coords.latitude,lng=p.coords.longitude;
    const el1=document.getElementById('clat'),el2=document.getElementById('clng');
    if(el1) el1.value=lat.toFixed(5);
    if(el2) el2.value=lng.toFixed(5);
    toast('Координаты получены — нажмите «Сохранить»');
  },()=>toast('Не удалось получить геолокацию'));
}

function verEv(id){
  const ev=S.events.find(e=>e.id===id);
  if(ev){ev.verified=true;saveEv();renderAdmin();renderEvents();
    if(S.mapInit&&window._map)addEvMarkers(window._map);
    toast('Ивент верифицирован ✓');}
}
function delEv(id){
  S.events=S.events.filter(e=>e.id!==id);saveEv();renderAdmin();renderEvents();
  if(S.mapInit&&window._map)addEvMarkers(window._map);
  toast('Ивент удалён');
}

/* ═══════════════════════════════════════════════════════════
   RADAR — GTA 4 Liberty City Style + Real Map
   ═══════════════════════════════════════════════════════════ */
const ZOOM_R=[0.002,0.005,0.011];
const ZOOM_MAP=[17,16,15];
let RAF=null;
let _minimap=null;

(function initRadar(){
  const cv=document.getElementById('radar');
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=W/2-6;
  let angle=0,targetAngle=0,hasGyro=false;
  let uLat=CLUB.lat,uLng=CLUB.lng;
  // Expose setter so refreshGeo() can push a new fix into the radar
  window._setRadarPos=(lat,lng)=>{
    uLat=lat;uLng=lng;
    if(_minimap) _minimap.setView([lat,lng],ZOOM_MAP[S.radarZoom],{animate:false});
    else initMinimap(lat,lng);
  };

  // Leaflet minimap behind canvas
  function initMinimap(lat,lng){
    if(_minimap) return;
    _minimap=L.map('radar-minimap',{
      center:[lat,lng],zoom:ZOOM_MAP[S.radarZoom],
      zoomControl:false,attributionControl:false,
      dragging:false,touchZoom:false,scrollWheelZoom:false,
      doubleClickZoom:false,boxZoom:false,keyboard:false,
      fadeAnimation:false,zoomAnimation:false,tap:false
    });
    window._minimapTL=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      {maxZoom:19,subdomains:'abcd'}).addTo(_minimap);
    setTimeout(()=>_minimap.invalidateSize(),150);
  }
  initMinimap(uLat,uLng);

  // Device orientation
  // webkitCompassHeading (iOS): 0..360 CW from magnetic North — use directly
  // e.alpha (Android): device rotation CCW (positive=CCW), convert to CW heading
  if('DeviceOrientationEvent' in window){
    const onOrient=e=>{
      const head=e.webkitCompassHeading!=null
        ?e.webkitCompassHeading
        :(e.alpha!=null?(360-e.alpha)%360:null);
      if(head!=null){hasGyro=true;angle=head;}
    };
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      document.getElementById('rwrap').addEventListener('click',async(e)=>{
        e.stopPropagation();
        try{const p=await DeviceOrientationEvent.requestPermission();
          if(p==='granted') window.addEventListener('deviceorientation',onOrient);}catch{}
        goMap();
      },{once:true});
    } else {
      window.addEventListener('deviceorientation',onOrient);
    }
  }

  // Desktop mouse fallback
  window.addEventListener('mousemove',e=>{
    if(!hasGyro){
      const dx=e.clientX-window.innerWidth/2,dy=e.clientY-window.innerHeight/2;
      targetAngle=Math.atan2(dx,-dy)*180/Math.PI;
    }
  });

  // User location — watchPosition for continuous GPS-grade accuracy
  if(navigator.geolocation){
    if(window._radarGeoWatch!=null) navigator.geolocation.clearWatch(window._radarGeoWatch);
    window._radarGeoWatch=navigator.geolocation.watchPosition(p=>{
      uLat=p.coords.latitude;uLng=p.coords.longitude;
      if(_minimap) _minimap.setView([uLat,uLng],ZOOM_MAP[S.radarZoom],{animate:false});
      else initMinimap(uLat,uLng);
    }, ()=>{}, {enableHighAccuracy:true, timeout:15000, maximumAge:0});
  }

  function blipXY(lat,lng){
    const r=ZOOM_R[S.radarZoom];
    return{bx:cx+(lng-uLng)/r*R*.85,by:cy-(lat-uLat)/r*R*.85};
  }

  function frame(){
    if(!hasGyro) angle+=(targetAngle-angle)*.05;
    ctx.clearRect(0,0,W,H);

    // Rotate minimap to keep North up relative to canvas (angle is CW heading)
    if(_minimap){
      const el=document.getElementById('radar-minimap');
      if(el) el.style.transform=`rotate(${-angle}deg)`;
      // setView is called by watchPosition only — not here (would be 60fps Leaflet ops)
    }

    /* clip */
    ctx.save();
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.clip();

    /* subtle dark overlay so rings are visible over tiles */
    ctx.fillStyle='rgba(4,7,16,0.07)';ctx.fillRect(0,0,W,H);

    /* rings */
    [.33,.66,1].forEach((s,i)=>{
      ctx.beginPath();ctx.arc(cx,cy,R*s,0,Math.PI*2);
      ctx.strokeStyle=`rgba(0,255,80,${.08+i*.05})`;ctx.lineWidth=1;ctx.stroke();
    });

    /* cross */
    ctx.strokeStyle='rgba(0,255,80,.09)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx,cy-R);ctx.lineTo(cx,cy+R);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-R,cy);ctx.lineTo(cx+R,cy);ctx.stroke();

    /* rotating compass ring — angle is CW heading, so ring rotates CCW by heading */
    ctx.save();ctx.translate(cx,cy);ctx.rotate(-angle*Math.PI/180);
    for(let d=0;d<360;d+=5){
      const r=d*Math.PI/180,ic=d%90===0,is=d%45===0;
      const tl=ic?16:is?10:5,op=ic?.9:is?.55:.25;
      const x1=Math.sin(r)*(R-tl),y1=-Math.cos(r)*(R-tl);
      const x2=Math.sin(r)*R,y2=-Math.cos(r)*R;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
      ctx.strokeStyle=`rgba(0,255,80,${op})`;ctx.lineWidth=ic?2.5:1;ctx.stroke();
    }
    ctx.font=`900 ${W*.07}px Orbitron,monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ['N','E','S','W'].forEach((l,i)=>{
      const r=i*90*Math.PI/180,x=Math.sin(r)*(R-30),y=-Math.cos(r)*(R-30);
      ctx.fillStyle=l==='N'?'rgba(255,55,55,.98)':'rgba(0,255,80,.92)';
      ctx.shadowColor=l==='N'?'rgba(255,50,50,.7)':'rgba(0,255,80,.5)';
      ctx.shadowBlur=12;ctx.fillText(l,x,y);
    });
    ctx.shadowBlur=0;ctx.restore();

    /* event blips */
    const t=Date.now();
    S.events.forEach(ev=>{
      const {bx,by}=blipXY(ev.lat,ev.lng);
      const dx=bx-cx,dy=by-cy;
      if(dx*dx+dy*dy>R*R*1.05) return;
      const col=ev.verified?'#4ade80':'#fbbf24';
      const g=ctx.createRadialGradient(bx,by,0,bx,by,10);
      g.addColorStop(0,col+'cc');g.addColorStop(1,col+'00');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(bx,by,10,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(bx,by,4.5,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
    });


    /* player dot — compass style */
    const ps=5+1.8*Math.sin(t*.004);
    const {o:uo}=getUserColorObj();
    const userCol=S.user?(S.user.role==='admin'?'#fbbf24':uo):'#ef4444';
    const pg=ctx.createRadialGradient(cx,cy,0,cx,cy,ps*3);
    pg.addColorStop(0,'rgba(255,255,255,1)');
    pg.addColorStop(.3,userCol+'cc');
    pg.addColorStop(1,userCol+'00');
    ctx.fillStyle=pg;ctx.beginPath();ctx.arc(cx,cy,ps*3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();

    /* heading chevron */
    ctx.save();ctx.translate(cx,cy);
    ctx.beginPath();ctx.moveTo(0,-16);ctx.lineTo(-6,0);ctx.lineTo(6,0);ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,.6)';ctx.fill();ctx.restore();

    ctx.restore(); /* end clip */

    /* outer ring */
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,200,75,.7)';ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy,R+6,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,200,75,.14)';ctx.lineWidth=5;ctx.stroke();

    RAF=requestAnimationFrame(frame);
  }
  frame();

  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){cancelAnimationFrame(RAF);}
    else{frame();}
  });
})();

/* ── Pull-to-refresh on home/radar view ─────────────────── */
(function(){
  const THRESHOLD=72;
  const vh=document.getElementById('vh');
  const ptr=document.getElementById('ptr');
  const arc=ptr.querySelector('.ptr-arc');
  let startY=0,pulling=false,triggered=false;

  vh.addEventListener('touchstart',e=>{
    if(S.view!=='home') return;
    startY=e.touches[0].clientY;
    pulling=true;triggered=false;
  },{passive:true});

  vh.addEventListener('touchmove',e=>{
    if(!pulling||S.view!=='home') return;
    const dy=e.touches[0].clientY-startY;
    if(dy<=0){ptr.classList.remove('visible','ready');return;}
    ptr.classList.add('visible');
    const ratio=Math.min(dy/THRESHOLD,1);
    arc.style.transform=`rotate(${ratio*300}deg)`;
    if(dy>=THRESHOLD&&!triggered){
      ptr.classList.add('ready');
      triggered=true;
    } else if(dy<THRESHOLD){
      ptr.classList.remove('ready');
      triggered=false;
    }
  },{passive:true});

  vh.addEventListener('touchend',()=>{
    if(!pulling) return;
    pulling=false;
    if(triggered){
      ptr.classList.remove('visible','ready');
      refreshGeo();
    } else {
      ptr.classList.remove('visible','ready');
    }
  });
})();

saveEv();
clubStatusUI();
updateUID();
const _rv=sessionStorage.getItem('pnd-rv');
if(_rv){sessionStorage.removeItem('pnd-rv');go(_rv);}
